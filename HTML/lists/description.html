<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Working with Descriptive lists</h1>
    <!-- dl, dt, dd are the three tags -->
    <h2>Frontend Glossary</h2>
    <dl>
      <dt>HTML</dt>
      <dd>Used to create a structure of a web page</dd>
      <dt>CSS</dt>
      <dd>Used for Styling</dd>
      <dt>JavaScript</dt>
      <dd>Used for listening to events</dd>
    </dl>
    <hr />

    <!-- multiple dt's and single dd -->
    <dl>
      <dt>Milk</dt>
      <dt>Bread</dt>
      <dt>Eggs</dt>
      <dd>Menu for breakfast</dd>
    </dl>
    <hr />

    <!-- one term and multiple definitions -->
    <dl>
      <dt>browser</dt>
      <dd>Chrome is a browser</dd>
      <dd>opera is a browser</dd>
    </dl>
  </body>
</html>
