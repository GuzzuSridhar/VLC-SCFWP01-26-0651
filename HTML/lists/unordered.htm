<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Working with Unordered Lists</h1>
    <h2>Learn about</h2>
    <!-- ul and li are the 2 tags used -->
    <ul>
      <li><a href="../anchors/bookmarks.html#ht">HTML</a></li>
      <li><a href="../anchors/bookmarks.html#cs">CSS</a></li>
      <li><a href="../anchors/bookmarks.html#js">JavaScript</a></li>
    </ul>

    <h2>Types of bullets / style</h2>
    <ul style="list-style: circle">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
    <ul style="list-style: square">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
    <ul style="list-style: disc">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
    <ul style="list-style: none">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </body>
</html>
