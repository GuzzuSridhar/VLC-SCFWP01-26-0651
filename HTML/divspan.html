<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Division -->
    <!-- block level element -->
    <!-- used to create sections in a page -->
    <!-- blocks are to be used when there are no semantic equivalents for creating sections -->
    <!-- a <div> tag is used to create a division -->
    <!-- Div by itself will not contain any content -->
    <!-- is always a container holding other elements -->
    <!-- empty divs are not rendered -->

    <div>
      <h1>About Me:</h1>
      <h2>Name: John</h2>
      <h2>Profession: Developer</h2>
    </div>

    <div style="background-color: cyan">
      <h3>Skills</h3>
      <p>Java</p>
      <p>Python</p>
      <p>HTML</p>
    </div>

    <div style="background-color: orange">
      <h3>Experience</h3>
      <p>Lorem ipsum dolor sit amet.</p>
      <p>Lorem ipsum dolor sit amet.</p>
    </div>

    <!-- nesting div -->
    <div style="background-color: brown; border: 1px solid blue">
      <p>Outer</p>
      <div style="background-color: cyan; border: 1px solid black">
        <p>Inner</p>
      </div>
    </div>

    <br />
    <br />

    <div style="height: 50px; width: 50%; background-color: orange"></div>
    <div style="height: 50px; width: 60%; background-color: cyan"></div>
    <div style="height: 50px; width: 70%; background-color: orange"></div>

    <!-- Span -->
    <!-- Span is an inline element -->
    <!-- most times used within a p tag -->
    <h2 style="text-align: center">Demo of a Span</h2>
    <p>This is a sample of a <span style="color: red">span tag</span></p>
  </body>
</html>
