<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 2 types of elements in HTML -->
    <!-- 
        1. Block Elements
        2. Inline Elements
     -->

    <!-- Block Elements
        1. Always infuse a new line before and after the element
        2. Occupy the entire viewport width
        3. always start on a new line
     -->
    <h1>Welcome</h1>
    <h2>Welcome</h2>

    <!-- Inline elements
        1. Occupy the width equal to the content
        2. no new line infused (before/after)
    -->
    <b>This is inline</b>
    <b>This is inline</b>

    <!-- Combination of inline and block elements -->
    <p>This is an explanation of <b>HTML</b></p>
    <!-- non usable (nesting block into inline elements) -->
    <b
      >This is an explanation of
      <p>HTML</p></b
    >
  </body>
</html>
