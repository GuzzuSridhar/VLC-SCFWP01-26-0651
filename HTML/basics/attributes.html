<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>Document</title>
  </head>
  <body>
    <!-- tag is a directive to the browser -->
    <!-- the tag can also have attributes (zero or more) -->
    <!-- Attribute is an additional directive to the browser -->
    <!-- An attribute is always on the opening tag -->
    <!-- most simple usage is to apply styles -->
    <!-- attribute is always a key value pair -->

    <!-- changing the color of text -->
    <p
      style="
        color: rgb(36, 13, 239);
        background-color: rgb(210, 159, 229);
        text-align: center;
      "
    >
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Nihil numquam
      velit ratione esse, itaque veniam, sed autem accusantium minima deleniti
      laudantium, consequuntur architecto pariatur temporibus dolorem quis
      cumque dolor soluta.
    </p>
  </body>
</html>
