<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table style="border: 1px solid blue; border-collapse: collapse">
      <thead>
        <tr>
          <th style="border: 1px solid blue">First Name</th>
          <th style="border: 1px solid blue">Last Name</th>
          <th style="border: 1px solid blue">Age</th>
          <th style="border: 1px solid blue">Location</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <!-- colspan -->
          <td colspan="2" style="border: 1px solid blue">David</td>
          <td style="border: 1px solid blue">55</td>
          <td style="border: 1px solid blue">Singapore</td>
        </tr>
        <tr>
          <td colspan="4" style="text-align: center; background-color: cyan">
            Sales
          </td>
        </tr>
        <tr>
          <td style="border: 1px solid blue">Bill</td>
          <td style="border: 1px solid blue">Gates</td>
          <td style="border: 1px solid blue">55</td>
          <!-- adding rospan from next 3 rows -->
          <td rowspan="3" style="border: 1px solid blue">Malaysia</td>
        </tr>
        <tr>
          <td style="border: 1px solid blue">Bill</td>
          <td style="border: 1px solid blue">Gates</td>
          <td style="border: 1px solid blue">55</td>
          <!-- <td style="border: 1px solid blue">Singapore</td> -->
        </tr>
        <tr>
          <td style="border: 1px solid blue">Bill</td>
          <td style="border: 1px solid blue">Gates</td>
          <td style="border: 1px solid blue">55</td>
          <!-- <td style="border: 1px solid blue">Singapore</td> -->
        </tr>
      </tbody>
    </table>
  </body>
</html>
