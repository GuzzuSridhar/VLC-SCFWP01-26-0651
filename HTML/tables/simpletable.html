<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Tables in HTML</h1>
    <!-- tables use the following tags
    1. table
    2. thead  - table head section
    3. tbody  - table body section
    4. tr  --  table row
    5. th  -- table head
    6. td  -- table data
    7. tfoot -- table footer
    -->

    <div>
      <table style="border: 1px solid black; border-collapse: collapse">
        <thead>
          <!-- one row (header) and each th represents a column -->
          <tr>
            <th
              style="
                background-color: cyan;
                color: red;
                border: 1px solid black;
                padding: 10px;
              "
            >
              Name
            </th>

              style="
                background-color: cyan;

              style="
                background-color: cyan;
                color: red;
                border: 1px solid black;
                padding: 10px;
              "
            >
              Salary
            </th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="border: 1px solid black; padding: 10px">John</td>
            <td style="border: 1px solid black; padding: 10px">Sales</td>
            <td style="border: 1px solid black; padding: 10px">$500</td>

            <td style="border: 1px solid black; padding: 10px">$700</td>

          </tr>
          <tr>
            <td style="border: 1px solid black; padding: 10px">Sara</td>
            <td style="border: 1px solid black; padding: 10px">Admin</td>
            <td style="border: 1px solid black; padding: 10px">$700</td>
          </tr>
          <tr>

            <td style="border: 1px solid black; padding: 10px">Admin</td>
            <td style="border: 1px solid black; padding: 10px">$700</td>
