<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Working with Images</h1>
    <hr />
    <!-- img is the tag used for displaying images -->
    <!-- img tag has 2 attributes mandatory -->
    <!-- alt is used as a text to read out for A11y and also visual text when the image is broken -->
    <img
      src="../resources/person1.jpg"
      alt="alternate text"
      height="200"
      width="200"
    />
    <img
      src="../resources/person2.jpg"
      alt="alternate text"
      height="200"
      width="200"
    />
    <img
      src="../resources/person3.jpg"
      alt="John's image"
      height="200"
      width="200"
    />
    <img
      src="../resources/person3.jpg"
      alt="John's image"
      style="height: 50px"
      ;
      height="50px"
    />
    <img
      src="../resources/person4.jpg"
      alt="John's image"
      height="200"
      width="200"
    />
  </body>
</html>
