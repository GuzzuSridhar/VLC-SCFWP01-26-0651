<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Multimedia in HTML</h1>
    <!-- <h2>Audio Element</h2>audio tag is used to show and play audio clips -->
    <audio controls>
      <source src="../resources/sample.ogg" type="audio/ogg" />
      <source src="../resources/sample.mp3" type="audio/mpeg" />
      your browser does not support this audio
    </audio>
    <br />
    <h2>Video Sample</h2>
    <video controls width="50%" poster="../resources/cover.jpg">
      <source src="../resources/sample.mp4" type="video/mp4" />
      <source src="../resources/sample.webm" type="video/webm" />
      your browser does not support video
    </video>
  </body>
</html>
