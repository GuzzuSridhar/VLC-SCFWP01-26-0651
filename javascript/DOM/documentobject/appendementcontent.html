<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- create elements with some default content -->
    <h1 id="head">Welcome</h1>
    <p id="content">This is the initial text in the paragraph</p>

    <script>
      // fetch the content of an element using a variable
      const data = document.getElementById("content");
      // append the text to the element
      data.innerText =
        data.innerText + "\n This is a paragraph infused by JavaScript";
      // alternatively
      data.innerText += "\n This is a paragraph infused by JavaScript";

      // update the content of an element without a variable
      document.getElementById("head").innerText += " to DOM";
    </script>
  </body>
</html>
