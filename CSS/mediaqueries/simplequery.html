<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: aqua;
        color: blue;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* mobile display */
      body::before{
        content: "Mobile View";
      }

      /* tablet display */
      @media screen and (min-width: 768px){
        body::before{
          content: "Tablet View";
        }
        body{
            background: #e9acac;
        }
      }

      /* desktop display  */
      @media screen and (min-width: 1024px){
        body::before{
          content: "Desktop View";
        }
        body{
            background-color: bisque;
        }
    </style>
  </head>
  <body></body>
</html>
