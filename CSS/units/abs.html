<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        background-color: blue;
        color: #ffffff;
        margin-bottom: 2px;
      }

      .pxbox {
        width: 96px;
        height: 96px;
      }

      .ptbox {
        width: 72pt;
        height: 72pt;
      }

      .inbox {
        width: 1in;
        height: 1in;
      }
    </style>
  </head>
  <body>
    <div class="box pxbox">96px box</div>
    <div class="box ptbox">72pt box</div>
    <div class="box inbox">1 In box</div>
  </body>
</html>
