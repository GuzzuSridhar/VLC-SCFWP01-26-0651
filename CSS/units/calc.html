<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .a {
        background-color: blue;
      }
      .b {
        width: 50vw;
        height: 50vw;
        margin-bottom: 10px;
        background-color: blue;
      }
      .c {
        width: calc(50vw - 20px);
        height: calc(50vw - 20px);
        background-color: rgb(255, 217, 0);
      }
    </style>
  </head>
  <body>
    <div class="a b"></div>
    <div class="a c"></div>
  </body>
</html>
