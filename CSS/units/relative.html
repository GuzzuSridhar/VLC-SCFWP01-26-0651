<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        font-size: 32px;
      }
      .box {
        background-color: aquamarine;
        margin-bottom: 10px;
        border: 1px solid black;
      }

      .rembox {
        height: 1rem;
        width: 1rem;
      }
      .pcbox {
        height: 20%;
        width: 50%;
      }

      /* actual way of using units for width and height are viewport related */
      .vw {
        width: 50vw;
        height: 50vh;
      }
    </style>
  </head>
  <body>
    <div class="box rembox"></div>
    <div class="box pcbox">I am a</div>
    <div class="box vw"></div>
  </body>
</html>

<!-- 
The relative units
1. em -- relative to parent
2. rem -- reltive to root
3. % -- relative to parent
4. vh -- viewport height
5. vw -- viewport width
-->
