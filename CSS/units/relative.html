<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        font-size: 100px;
      }
      .box {
        background-color: aquamarine;
        margin-bottom: 10px;
      }
      .rembox {
        height: 1rem;
        width: 1rem;
      }
      .pcbox {
        height: 10%;
        width: 10%;
      }
    </style>
  </head>
  <body>
    <div class="box rembox"></div>
    <!-- <div class="box pcbox">this is a % box</div> -->
    <div class="box pcbox"></div>
  </body>
</html>

<!-- 
The relative units
1. em -- relative to parent
2. rem -- reltive to root
3. % -- relative to parent
4. vh -- viewport height
5. vw -- viewport width
-->
