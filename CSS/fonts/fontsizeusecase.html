<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html {
        font-size: 100%;
        /* listen to the OS / browser for font size */
      }
      .p {
        font-size: 16px;
      }

      .r {
        font-size: 2rem;
      }
    </style>
  </head>
  <body>
    <p>This 100% of browser's font size</p>
    <p class="p">This is pixel . Will not change</p>
    <p class="r">This is rem . Will change</p>
  </body>
</html>
