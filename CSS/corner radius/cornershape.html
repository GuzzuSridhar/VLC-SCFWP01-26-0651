<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
      }
      .bevel {
        height: 180px;
        width: 200px;
        margin: auto;
        background-color: #235bf3;
        box-shadow: 1px 1px 3px gray;
        border-radius: 30px;
        corner-shape: bevel;
        border: 2px solid black;
      }
      .scoop {
        height: 180px;
        width: 200px;
        margin: auto;
        background-color: #ff3c00;
        box-shadow: 1px 1px 3px gray;
        border-radius: 30px;
        corner-shape: scoop;
        border: 2px solid black;
      }
      .notch {
        height: 180px;
        width: 200px;
        margin: auto;
        background-color: #0af406;
        box-shadow: 1px 1px 3px gray;
        border-radius: 30px;
        corner-shape: notch;
        border: 2px solid black;
      }
      h1 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="bevel"></div>
    <div class="scoop"></div>
    <div class="notch"></div>
  </body>
</html>
