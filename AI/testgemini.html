<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f2f5;
      }

      div {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
      }

      img {
        width: 100%;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
      }

      img:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <header
      style="
        text-align: center;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      "
    >
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod
        tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim
        veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea
        commodo consequat.
      </p>
    </header>

    <div>
      <img src="https://picsum.photos/200/300?random=1" alt="Random Image 1" />
      <img src="https://picsum.photos/200/300?random=2" alt="Random Image 2" />
      <img src="https://picsum.photos/200/300?random=3" alt="Random Image 3" />
      <img src="https://picsum.photos/200/300?random=4" alt="Random Image 4" />
      <img src="https://picsum.photos/200/300?random=5" alt="Random Image 5" />
      <img src="https://picsum.photos/200/300?random=6" alt="Random Image 6" />
      <img src="https://picsum.photos/200/300?random=7" alt="Random Image 7" />
      <img src="https://picsum.photos/200/300?random=8" alt="Random Image 8" />
      <img src="https://picsum.photos/200/300?random=9" alt="Random Image 9" />
      <img
        src="https://picsum.photos/200/300?random=10"
        alt="Random Image 10"
      />
    </div>
  </body>
</html>
