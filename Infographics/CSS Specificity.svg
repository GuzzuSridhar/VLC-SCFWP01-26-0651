<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="elementGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="classGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="idGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="inlineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="800" fill="url(#grid)"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="100" fill="url(#headerGrad)" opacity="0.15"/>
  <text x="600" y="48" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800" letter-spacing="1">
    CSS SPECIFICITY · SELECTOR HIERARCHY
  </text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-size="14" letter-spacing="0.5">
    How browsers decide which CSS rule wins — Higher specificity overrides lower specificity
  </text>

  <!-- Direction arrow bar (top) -->
  <g transform="translate(0, 125)">
    <rect x="150" y="0" width="900" height="40" rx="20" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="300" y="25" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="500">◀ LOWER SPECIFICITY</text>
    <text x="900" y="25" text-anchor="middle" fill="#f87171" font-size="13" font-weight="500">HIGHER SPECIFICITY ▶</text>
    <!-- Arrow indicators -->
    <polygon points="700,12 715,20 700,28" fill="#f87171" opacity="0.8"/>
    <polygon points="710,12 725,20 710,28" fill="#f87171" opacity="0.8"/>
    <polygon points="500,12 485,20 500,28" fill="#64748b" opacity="0.6"/>
    <polygon points="490,12 475,20 490,28" fill="#64748b" opacity="0.6"/>
  </g>

  <!-- ============================================ -->
  <!-- COLUMN 1: ELEMENT & UNIVERSAL (LOWEST) -->
  <!-- ============================================ -->
  <g transform="translate(80, 200)" filter="url(#shadow)">
    <!-- Card background -->
    <rect x="0" y="0" width="240" height="420" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    
    <!-- Header bar -->
    <rect x="0" y="0" width="240" height="60" rx="16" fill="url(#elementGrad)"/>
    <rect x="0" y="30" width="240" height="30" fill="url(#elementGrad)"/>
    
    <!-- Icon & title -->
    <text x="120" y="38" text-anchor="middle" fill="#ffffff" font-size="28">🌐</text>
    <text x="120" y="78" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">ELEMENT &amp; UNIVERSAL</text>
    
    <!-- Badge -->
    <rect x="55" y="92" width="130" height="26" rx="13" fill="#334155"/>
    <text x="120" y="109" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="monospace">(0,0,0,1) or (0,0,0,0)</text>
    
    <!-- Divider -->
    <line x1="20" y1="130" x2="220" y2="130" stroke="#334155" stroke-width="1"/>
    
    <!-- Examples -->
    <text x="120" y="158" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">SELECTOR EXAMPLES</text>
    <rect x="25" y="170" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="190" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">div { }</text>
    
    <rect x="25" y="208" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">p { }</text>
    
    <rect x="25" y="246" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="266" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">* { }</text>
    
    <rect x="25" y="284" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="304" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">::before { }</text>
    
    <!-- Weight indicator bar -->
    <rect x="40" y="340" width="160" height="8" rx="4" fill="#334155"/>
    <rect x="40" y="340" width="40" height="8" rx="4" fill="#64748b"/>
    
    <text x="120" y="372" text-anchor="middle" fill="#64748b" font-size="11">Weight: Very Low</text>
    <text x="120" y="395" text-anchor="middle" fill="#475569" font-size="10">Wins only if no other rules apply</text>
  </g>

  <!-- Arrow between col 1 and 2 -->
  <g transform="translate(335, 380)">
    <polygon points="0,0 25,10 0,20" fill="#475569"/>
    <text x="40" y="15" fill="#64748b" font-size="11" font-family="monospace">+</text>
  </g>

  <!-- ============================================ -->
  <!-- COLUMN 2: CLASS & PSEUDO-CLASS -->
  <!-- ============================================ -->
  <g transform="translate(360, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="420" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    
    <rect x="0" y="0" width="240" height="60" rx="16" fill="url(#classGrad)"/>
    <rect x="0" y="30" width="240" height="30" fill="url(#classGrad)"/>
    
    <text x="120" y="38" text-anchor="middle" fill="#ffffff" font-size="28">📘</text>
    <text x="120" y="78" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">CLASS &amp; PSEUDO-CLASS</text>
    
    <rect x="55" y="92" width="130" height="26" rx="13" fill="#1e3a5f"/>
    <text x="120" y="109" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600" font-family="monospace">(0,0,1,0)</text>
    
    <line x1="20" y1="130" x2="220" y2="130" stroke="#1e3a5f" stroke-width="1"/>
    
    <text x="120" y="158" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">SELECTOR EXAMPLES</text>
    <rect x="25" y="170" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="190" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">.button { }</text>
    
    <rect x="25" y="208" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">:hover { }</text>
    
    <rect x="25" y="246" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="266" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">[type="text"] { }</text>
    
    <rect x="25" y="284" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="304" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">:first-child { }</text>
    
    <rect x="40" y="340" width="160" height="8" rx="4" fill="#1e3a5f"/>
    <rect x="40" y="340" width="95" height="8" rx="4" fill="#3b82f6"/>
    
    <text x="120" y="372" text-anchor="middle" fill="#60a5fa" font-size="11">Weight: Medium</text>
    <text x="120" y="395" text-anchor="middle" fill="#475569" font-size="10">Overrides element selectors</text>
  </g>

  <!-- Arrow between col 2 and 3 -->
  <g transform="translate(615, 380)">
    <polygon points="0,0 25,10 0,20" fill="#475569"/>
    <text x="40" y="15" fill="#64748b" font-size="11" font-family="monospace">+</text>
  </g>

  <!-- ============================================ -->
  <!-- COLUMN 3: ID SELECTOR -->
  <!-- ============================================ -->
  <g transform="translate(640, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="420" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    
    <rect x="0" y="0" width="240" height="60" rx="16" fill="url(#idGrad)"/>
    <rect x="0" y="30" width="240" height="30" fill="url(#idGrad)"/>
    
    <text x="120" y="38" text-anchor="middle" fill="#ffffff" font-size="28">🏷️</text>
    <text x="120" y="78" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">ID SELECTOR</text>
    
    <rect x="55" y="92" width="130" height="26" rx="13" fill="#451a03"/>
    <text x="120" y="109" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600" font-family="monospace">(0,1,0,0)</text>
    
    <line x1="20" y1="130" x2="220" y2="130" stroke="#451a03" stroke-width="1"/>
    
    <text x="120" y="158" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">SELECTOR EXAMPLES</text>
    <rect x="25" y="170" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="190" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">#header { }</text>
    
    <rect x="25" y="208" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">#main-nav { }</text>
    
    <rect x="25" y="246" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="266" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">#unique-element { }</text>
    
    <rect x="25" y="284" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="304" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">#footer { }</text>
    
    <rect x="40" y="340" width="160" height="8" rx="4" fill="#451a03"/>
    <rect x="40" y="340" width="130" height="8" rx="4" fill="#f59e0b"/>
    
    <text x="120" y="372" text-anchor="middle" fill="#fbbf24" font-size="11">Weight: High</text>
    <text x="120" y="395" text-anchor="middle" fill="#475569" font-size="10">Overrides class selectors</text>
  </g>

  <!-- Arrow between col 3 and 4 -->
  <g transform="translate(895, 380)">
    <polygon points="0,0 25,10 0,20" fill="#475569"/>
    <text x="40" y="15" fill="#64748b" font-size="11" font-family="monospace">+</text>
  </g>

  <!-- ============================================ -->
  <!-- COLUMN 4: INLINE STYLE (HIGHEST) -->
  <!-- ============================================ -->
  <g transform="translate(920, 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="420" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    
    <!-- Glow effect for highest -->
    <rect x="0" y="0" width="240" height="420" rx="16" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
    
    <rect x="0" y="0" width="240" height="60" rx="16" fill="url(#inlineGrad)"/>
    <rect x="0" y="30" width="240" height="30" fill="url(#inlineGrad)"/>
    
    <text x="120" y="38" text-anchor="middle" fill="#ffffff" font-size="28">⚡</text>
    <text x="120" y="78" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="700">INLINE STYLE</text>
    
    <rect x="55" y="92" width="130" height="26" rx="13" fill="#450a0a"/>
    <text x="120" y="109" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600" font-family="monospace">(1,0,0,0)</text>
    
    <line x1="20" y1="130" x2="220" y2="130" stroke="#450a0a" stroke-width="1"/>
    
    <text x="120" y="158" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">EXAMPLE</text>
    <rect x="25" y="170" width="190" height="55" rx="8" fill="#0f172a"/>
    <text x="120" y="190" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="monospace">style="color: red;</text>
    <text x="120" y="208" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="monospace">font-size: 20px;"</text>
    
    <rect x="25" y="240" width="190" height="30" rx="8" fill="#0f172a"/>
    <text x="120" y="260" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace">&lt;div style="..."&gt;</text>
    
    <!-- Winner badge -->
    <rect x="55" y="295" width="130" height="28" rx="14" fill="#ef4444" opacity="0.15"/>
    <text x="120" y="314" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">🏆 ALWAYS WINS</text>
    
    <rect x="40" y="340" width="160" height="8" rx="4" fill="#450a0a"/>
    <rect x="40" y="340" width="160" height="8" rx="4" fill="#ef4444"/>
    
    <text x="120" y="372" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">Weight: Highest</text>
    <text x="120" y="395" text-anchor="middle" fill="#475569" font-size="10">Overrides ALL external CSS</text>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM SECTION: Specificity Calculation Guide -->
  <!-- ============================================ -->
  <g transform="translate(50, 660)">
    <rect x="0" y="0" width="1100" height="115" rx="16" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    
    <text x="550" y="30" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">📐 How Specificity Is Calculated (4-Part Score)</text>
    
    <!-- Formula boxes -->
    <g transform="translate(60, 50)">
      <rect x="0" y="0" width="220" height="45" rx="8" fill="#450a0a"/>
      <text x="110" y="18" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">INLINE</text>
      <text x="110" y="35" text-anchor="middle" fill="#f87171" font-size="20" font-weight="800" font-family="monospace">1,0,0,0</text>
    </g>
    
    <text x="290" y="77" fill="#475569" font-size="20" font-weight="700">+</text>
    
    <g transform="translate(310, 50)">
      <rect x="0" y="0" width="220" height="45" rx="8" fill="#451a03"/>
      <text x="110" y="18" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">ID SELECTORS</text>
      <text x="110" y="35" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="800" font-family="monospace">0,1,0,0</text>
    </g>
    
    <text x="540" y="77" fill="#475569" font-size="20" font-weight="700">+</text>
    
    <g transform="translate(560, 50)">
      <rect x="0" y="0" width="220" height="45" rx="8" fill="#1e3a5f"/>
      <text x="110" y="18" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">CLASSES / ATTRIBUTES</text>
      <text x="110" y="35" text-anchor="middle" fill="#3b82f6" font-size="20" font-weight="800" font-family="monospace">0,0,1,0</text>
    </g>
    
    <text x="790" y="77" fill="#475569" font-size="20" font-weight="700">+</text>
    
    <g transform="translate(810, 50)">
      <rect x="0" y="0" width="220" height="45" rx="8" fill="#334155"/>
      <text x="110" y="18" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">ELEMENTS / PSEUDOS</text>
      <text x="110" y="35" text-anchor="middle" fill="#cbd5e1" font-size="20" font-weight="800" font-family="monospace">0,0,0,1</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="600" y="795" text-anchor="middle" fill="#475569" font-size="11">
    Higher score wins · If scores are equal, the last declared rule wins · Avoid overusing !important
  </text>
</svg>